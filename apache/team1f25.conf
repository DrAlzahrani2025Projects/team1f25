<VirtualHost *:443>
    ServerName your-domain.tld

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/your-domain.tld/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/your-domain.tld/privkey.pem

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket upgrade (client uses wss://; Apache tunnels to ws:// backend)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/(.*)$ ws://127.0.0.1:8501/$1 [P,L]

    # Everything else over HTTP to the backend
    ProxyPass        / http://127.0.0.1:8501/
    ProxyPassReverse / http://127.0.0.1:8501/

    # (Optional) basic security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  /var/log/apache2/team1f25_ssl_error.log
    CustomLog /var/log/apache2/team1f25_ssl_access.log combined
</VirtualHost>
